name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/wallpaper-overrider.exe dist/wallpaper-overrider.exe
          Compress-Archive -Path dist/wallpaper-overrider.exe -DestinationPath dist/wallpaper-overrider-windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-overrider-windows-x64
          path: |
            dist/wallpaper-overrider.exe
            dist/wallpaper-overrider-windows-x64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wallpaper-overrider.exe
            dist/wallpaper-overrider-windows-x64.zip
          generate_release_notes: true
